name: Cloud PC + Release-Hosted AweSun Connection

on:
  workflow_dispatch:
    inputs:
      runtime_minutes:
        description: "Runtime in minutes"
        required: false
        default: "355"

permissions:
  contents: read

defaults:
  run:
    shell: pwsh

jobs:
  desktop:
    runs-on: windows-latest
    timeout-minutes: 370
    steps:
      - name: Optimize System and Disable Firewall
        run: |
          Set-NetFirewallProfile -Profile Public,Private,Domain -Enabled False
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Start-Service -Name "TermService" -ErrorAction SilentlyContinue

      - name: Pull Installer From GitHub Release Storage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          Write-Host "Pulling AweSun executable from your Release v1.0..."
          
          # Added explicit repository flag to bypass the 'not a git repository' error
          gh release download v1.0 --repo "tusharpop553-afk/OperaGX-RDP" --pattern "AweSun_Setup.exe" --dir "$env:TEMP"
          
          $installer = "$env:TEMP\AweSun_Setup.exe"
          if (Test-Path $installer) {
              Write-Host "✅ Installer pulled successfully from release storage!"
          } else {
              Write-Error "CRITICAL: AweSun_Setup.exe could not be retrieved from Release v1.0."
              exit 1
          }

      - name: Install AweSun Silently
        run: |
          $installer = "$env:TEMP\AweSun_Setup.exe"
          Start-Process -FilePath $installer -ArgumentList "/S", "/allusers" -Wait
          Start-Sleep -Seconds 12

      - name: Force Start AweSun Service and Parse Credentials
        run: |
          $aweSunPath = "${env:ProgramFiles}\AweSun\AweSun.exe"
          if (-not (Test-Path $aweSunPath)) { $aweSunPath = "${env:ProgramFiles (x86)}\AweSun\AweSun.exe" }
          
          Start-Process $aweSunPath -ArgumentList "-service" -NoNewWindow
          Start-Sleep -Seconds 15
          
          $configPath = "$env:AppData\AweSun\config.ini"
          if (-not (Test-Path $configPath)) { $configPath = "C:\ProgramData\AweSun\config.ini" }
          
          if (Test-Path $configPath) {
              $config = Get-Content $configPath
              $AweSunID = ($config | Select-String "id=").Line -replace "id=", ""
              $AweSunPw = ($config | Select-String "pwd=").Line -replace "pwd=", ""
              
              $Esc = [char]27
              Write-Host "`n${Esc}[36m###########################################################################${Esc}[0m"
              Write-Host "${Esc}[33m🚨 DEDICATED AWESUN REMOTE COMPUTER SESSION READY 🚨${Esc}[0m"
              Write-Host "${Esc}[36m###########################################################################${Esc}[0m"
              Write-Host "${Esc}[32m🆔 AWESUN DEVICE ID: $AweSunID${Esc}[0m"
              Write-Host "${Esc}[32m🔑 PASSCODE / PASSWORD: $AweSunPw${Esc}[0m"
              Write-Host "${Esc}[36m###########################################################################${Esc}[0m`n"
          } else {
              Write-Warning "Configuration matrix delayed initialization."
              Get-Process | Where-Object {$_.Name -like "*AweSun*"}
          }

      - name: Session Keep Alive Loop
        run: |
          $mins = [int]"${{ inputs.runtime_minutes }}"
          $end = (Get-Date).AddMinutes($mins)
          while ((Get-Date) -lt $end) {
            Write-Host "AweSun Server Stream Active | Heartbeat Signal Live"
            Start-Sleep -Seconds 60
          }
